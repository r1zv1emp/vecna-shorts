version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vecna_shorts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/vecna_shorts
      JWT_SECRET: local-dev-jwt-secret-change-in-prod
      ENCRYPTION_KEY: local-dev-encrypt-key-32chars-min!!
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      PORT: "3001"
    depends_on:
      - postgres
      - redis

  bot-worker:
    build:
      context: ./bot-worker
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/vecna_shorts
      ENCRYPTION_KEY: local-dev-encrypt-key-32chars-min!!
    depends_on:
      - postgres
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
